# Fairness baseline for the temporal-fusion experiment: SAME backbone/weights as
# recursive_jepa.yaml, but z_L is re-seeded per frame and time is fused by the
# decoder's L-TAE instead of by the recursion. Pair with decoder=seg_upernet_mt_ltae.
#
# Keep EVERY backbone setting below identical to the recursive_jepa.yaml arm you
# are comparing against (arch / n_inner_steps / n_outer_steps / output_layers /
# bands) — only the temporal-fusion mechanism should differ.
_target_: pangaea.encoders.recursive_jepa_ltae_baseline_encoder.RecursiveJEPALTAEBaselineEncoder

encoder_weights: /home/gianfranco/projects/2025/Project_1/nested_mae_BEN/output_dir_pretrain_jepa_vo/recursive_jepa_vo_small_20260611_134108/weight_ema-400.pth
download_url: null

# EMA shadows omit persistent buffers — restore zL_init from the same run's
# non-EMA checkpoint (used as the per-frame spatial-recurrence seed here).
buffer_weights: /home/gianfranco/projects/2025/Project_1/nested_mae_BEN/output_dir_pretrain_jepa_vo/recursive_jepa_vo_small_20260611_134108/checkpoint-400.pth

repo_path: /home/gianfranco/projects/2025/Project_1/nested_mae_BEN

input_size: 128

# --- backbone: MUST match your pretrained checkpoint (and the recursive arm) ---
model_name: recursive_jepa_vo_small
arch: gated_normed
embed_dim: 384
output_dim: 384
patch_size: 16
in_chans: 10

# per-frame SPATIAL recurrence depth (no temporal threading in this baseline).
# Match the recursive arm's loop counts so backbone usage is identical.
n_inner_steps: 3
n_outer_steps: 1

# pyramid = outer-cycle snapshots of each frame; L-TAE then fuses across time.
# Must index into [0, n_outer_steps-1].
output_layers: [0]

# --- stem band adaptation: BEN 12-band -> PASTIS 10-band ---
pretrain_in_chans: 12
pretrain_band_index: [1, 2, 3, 4, 5, 6, 7, 8, 10, 11]

# temporal_bp_frames is unused here (time is handled by the decoder), kept for
# config symmetry with recursive_jepa.yaml.
temporal_bp_frames: 5
num_frames: ${dataset.multi_temporal}

input_bands:
  optical:
    - B2
    - B3
    - B4
    - B5
    - B6
    - B7
    - B8
    - B8A
    - B11
    - B12



