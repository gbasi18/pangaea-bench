_target_: pangaea.datasets.dynamicen_stream.DynamicEarthNetStream
dataset_name: DynamicEarthNetStream
root_path: /home/gianfranco/projects/2025/Datasets/DynamicEarthNet
download_url: None
auto_download: False

img_size: 1024
# number of MONTHS per sample (per-month labels; see dynamicen_stream.py)
multi_temporal: 12
multi_modal: False
# deterministic AOI-level split of the 53 usable labeled AOIs (sorted names):
# last 8 -> test, previous 8 -> val, first 37 -> train
val_aois: 8
test_aois: 8

# classes (snow&ice, the 7th one-hot band, is mapped to ignore_index)
ignore_index: -1
num_classes: 6
classes:
  - impervious surface
  - agriculture
  - forest & other vegetation
  - wetlands
  - soil
  - water
distribution:
  - 0.071
  - 0.103
  - 0.449
  - 0.07
  - 0.28
  - 0.08

# Sentinel-2 monthly tifs, 12 bands int16, 1024x1024 (resampled to the 3m
# label grid). Band ORDER is the DEN resolution-grouped convention
# (10m block, 20m block, 60m block), inferred from the spectral statistics
# (NIR/red-edge ramp at positions 4-8, coastal-aerosol lowest at 11):
#   [B2, B3, B4, B8, B5, B6, B7, B8A, B11, B12, B1, B9]
# All 10 bands the BEN-pretrained encoders expect are physically present --
# BandFilter reorders by name, BandPadding pads nothing.
bands:
  optical:
    - B2
    - B3
    - B4
    - B8
    - B5
    - B6
    - B7
    - B8A
    - B11
    - B12
    - B1
    - B9

# computed 2026-07-09 over the 37 train AOIs (222 tifs, every 4th month,
# 4x pixel subsampling)
