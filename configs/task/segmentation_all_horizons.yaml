trainer:
  _target_: pangaea.engine.trainer_all_horizons.AllHorizonsSegTrainer
  # params overwritten in run
  model: null
  train_loader: null
  optimizer: null
  lr_scheduler: null
  evaluator: null
  exp_dir: null
  device: null
  criterion: null

  # params to adapt
  n_epochs: 80
  precision: fp32
  ckpt_interval: 20
  eval_interval: 5
  log_interval: 5
  best_metric_key: mIoU
  use_wandb: ${use_wandb}

  # all-horizons experiment ("backprop the decoder at each outer step", encoder
  # kept frozen; RecursiveJEPAFeedback-family encoders only, no-op fallback to
  # plain SegTrainer behaviour for any other encoder). Every horizon 0..T-1 is
  # decoded and backpropagated through the decoder every step (gradient
  # accumulation, not held-graph summation -- see
  # pangaea/engine/trainer_all_horizons.py). Costs ~T forward+backward passes
  # per step instead of 1: fine at T=6, raise horizon_stride for large T.
  min_horizon: 1
  horizon_stride: 1
  log_horizon_losses: true
  # one optimizer step per horizon (decoder weights update between horizons
  # of the same batch) instead of accumulating all horizons into one step.
  step_per_horizon: true

evaluator:
  _target_: pangaea.engine.evaluator.SegEvaluator
  # params overwritten in run
  val_loader: null
  exp_dir: null
  device: null
  use_wandb: ${use_wandb}
  inference_mode: sliding
  sliding_inference_batch: 8
