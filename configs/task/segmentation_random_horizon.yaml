trainer:
  _target_: pangaea.engine.trainer_random_horizon.RandomHorizonSegTrainer
  # params overwritten in run
  model: null
  train_loader: null
  optimizer: null
  lr_scheduler: null
  evaluator: null
  exp_dir: null
  device: null
  criterion: null

  # params to adapt
  n_epochs: 80
  precision: fp32
  ckpt_interval: 20
  eval_interval: 5
  log_interval: 5
  best_metric_key: mIoU
  use_wandb: ${use_wandb}

  # randomized-horizon experiment (RecursiveJEPAFeedback-family encoders only;
  # no-op fallback to plain SegTrainer behaviour for any other encoder). See
  # pangaea/engine/trainer_random_horizon.py.
  min_horizon: 1
  p_full_horizon: 0.5
  log_horizon: true

evaluator:
  _target_: pangaea.engine.evaluator.SegEvaluator
  # params overwritten in run
  val_loader: null
  exp_dir: null
  device: null
  use_wandb: ${use_wandb}
  inference_mode: sliding
  sliding_inference_batch: 8
