trainer:
  _target_: pangaea.engine.trainer_horizon_aux.HorizonAuxSegTrainer
  # params overwritten in run
  model: null
  train_loader: null
  optimizer: null
  lr_scheduler: null
  evaluator: null
  exp_dir: null
  device: null
  criterion: null

  # params to adapt
  n_epochs: 80
  precision: fp32
  ckpt_interval: 20
  eval_interval: 5
  log_interval: 5
  best_metric_key: mIoU
  use_wandb: ${use_wandb}

  # auxiliary-horizon experiment (RecursiveJEPAFeedback-family encoders only;
  # no-op fallback to plain SegTrainer behaviour for any other encoder). Every
  # step still fully supervises the true final horizon (t=T-1); most steps
  # additionally add a short-horizon auxiliary loss on top instead of
  # replacing the full-horizon step, unlike segmentation_random_horizon.yaml.
  # See pangaea/engine/trainer_horizon_aux.py.
  min_horizon: 1
  aux_weight: 0.3
  p_aux: 1.0
  log_horizon: true

evaluator:
  _target_: pangaea.engine.evaluator.SegEvaluator
  # params overwritten in run
  val_loader: null
  exp_dir: null
  device: null
  use_wandb: ${use_wandb}
  inference_mode: sliding
  sliding_inference_batch: 8
