trainer:
  _target_: pangaea.engine.trainer_stream_decode.StreamDecodeSegTrainer
  # params overwritten in run
  model: null
  train_loader: null
  optimizer: null
  lr_scheduler: null
  evaluator: null
  exp_dir: null
  device: null
  criterion: null

  # params to adapt
  n_epochs: 80
  precision: fp32
  ckpt_interval: 20
  eval_interval: 5
  log_interval: 5
  best_metric_key: mIoU
  use_wandb: ${use_wandb}

  # stream-decode experiment ("backprop the decoder at each frame, update,
  # then continue", encoder kept frozen; RecursiveJEPAFeedbackStream-family
  # encoders only, no-op fallback to plain SegTrainer behaviour for any other
  # encoder). Each frame gets its own full-strength optimizer step -- no
  # horizon-averaging/dilution, unlike segmentation_all_horizons.yaml. See
  # pangaea/engine/trainer_stream_decode.py.
  min_horizon: 1
  log_horizon_losses: true

evaluator:
  _target_: pangaea.engine.evaluator.SegEvaluator
  # params overwritten in run
  val_loader: null
  exp_dir: null
  device: null
  use_wandb: ${use_wandb}
  inference_mode: sliding
  sliding_inference_batch: 8
